<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>{{ .Title }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  
  <link rel="canonical" href="{{ .Permalink }}">
  <meta name="robots" content="index, follow">
  <meta name="author" content="Forge and Flight Academy">
  <meta name="msvalidate.01" content="CBB3DDC3738AE030F4107D4B0869525F">

  <!-- Open Graph -->
  <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:title" content="{{ .Title }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:image" content="{{ .Site.BaseURL }}images/og-image.jpg">
  <meta property="og:site_name" content="Forge and Flight Academy">
  <meta property="og:locale" content="en_US">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ .Title }}">
  <meta name="twitter:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta name="twitter:image" content="{{ .Site.BaseURL }}images/og-image.jpg">

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="/images/favicon.jpg">
  <link rel="shortcut icon" type="image/jpeg" href="/images/favicon.jpg">
  <link rel="apple-touch-icon" href="/images/favicon.jpg">
  
  <link rel="stylesheet" href="/css/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-35K06LBZWT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-35K06LBZWT');
  </script>

  <!-- JSON-LD Organization Schema -->
  {{ if .IsHome }}
    <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": ["LocalBusiness", "EducationalOrganization"],
    "name": "Forge and Flight Academy, LLC",
    "url": "https://forgeandflightacademy.com",
    "logo": "https://forgeandflightacademy.com/images/favicon.jpg",
    "image": "https://forgeandflightacademy.com/images/og-image.jpg",
    "description": "Professional UAS training for Department of Defense units, government agencies, universities, and commercial operators. Fort Bragg adjacent, Fayetteville, NC.",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "5040 Shimmer Dr",
      "addressLocality": "Fayetteville",
      "addressRegion": "NC",
      "postalCode": "28304",
      "addressCountry": "US"
    },
    "geo": {
      "@type": "GeoCoordinates",
      "latitude": "35.0527",
      "longitude": "-78.8784"
    },
    "areaServed": [
      {
        "@type": "Place",
        "name": "Fort Bragg, NC"
      },
      {
        "@type": "Place",
        "name": "Fayetteville, NC"
      },
      {
        "@type": "AdministrativeArea",
        "name": "North Carolina"
      },
      {
        "@type": "Country",
        "name": "United States"
      }
    ],
    "contactPoint": {
      "@type": "ContactPoint",
      "email": "info@forgeandflightacademy.com",
      "contactType": "Admissions",
      "availableLanguage": ["English", "Spanish"]
    },
    "parentOrganization": {
      "@type": "Organization",
      "name": "Forge & Flight Holdings, Inc.",
      "url": "https://forgeandflight.com"
    },
    "hasCredential": {
      "@type": "EducationalOccupationalCredential",
      "name": "SAM.gov Active Registration",
      "credentialCategory": "Government Contractor"
    },
    "identifier": [
      {
        "@type": "PropertyValue",
        "name": "UEI",
        "value": "YV8UNYJWZHV1"
      },
      {
        "@type": "PropertyValue",
        "name": "CAGE Code",
        "value": "1A6J3"
      }
    ],
    "slogan": "Build It. Program It. Fly It."
  }
  </script>
  {{ end }}

  {{ if eq .Section "courses" }}
  {{ if not .IsSection }}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Course",
    "name": "{{ .Title }}",
    "description": "{{ .Description | default .Site.Params.description }}",
    "url": "{{ .Permalink }}",
    "provider": {
      "@type": "EducationalOrganization",
      "name": "Forge and Flight Academy, LLC",
      "url": "https://forgeandflightacademy.com",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Fayetteville",
        "addressRegion": "NC",
        "addressCountry": "US"
      }
    },
    "educationalLevel": "Professional",
    "inLanguage": "en-US",
    "availableLanguage": "English",
    "courseMode": ["onsite", "blended"]
  }
  </script>
  {{ end }}
  {{ end }}

  {{ block "head" . }}{{ end }}
</head>
<body>
  {{ partial "header.html" . }}
  
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  
  {{ partial "footer.html" . }}
  
  <script src="/js/main.js"></script>
</body>
</html>
