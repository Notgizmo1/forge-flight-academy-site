{{ define "main" }}
<section class="hero" style="padding: 3rem 2rem;">
  <div class="container" style="padding: 0;">
    <div style="text-align: center;">
      <h1>{{ .Title }}</h1>
      <p style="max-width: 640px; margin: 1rem auto 0; color: var(--light-gray);">{{ .Params.description }}</p>
    </div>
  </div>
</section>

<div class="container">
  <div style="max-width: 820px; margin: 0 auto; display: flex; flex-direction: column; gap: 2rem;">
    {{ range .Pages.ByDate.Reverse }}
    <article class="card" style="border-left: 4px solid var(--amber); padding: 2rem;">
      <div style="font-size: 0.8rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.5rem;">
        {{ .Date.Format "January 2, 2006" }}
      </div>
      <h2 style="margin: 0 0 0.75rem; font-size: 1.3rem; line-height: 1.3;">
        <a href="{{ .Permalink }}" style="color: var(--navy); text-decoration: none;">{{ .Title }}</a>
      </h2>
      <p style="margin: 0 0 1.25rem; color: #374151; line-height: 1.65;">{{ .Description }}</p>
      <a href="{{ .Permalink }}" class="btn btn-secondary" style="font-size: 0.85rem; padding: 0.5rem 1.2rem;">Read More →</a>
    </article>
    {{ end }}
  </div>

  <div style="text-align: center; margin: 3rem 0;">
    <a href="/contact/" class="btn btn-primary">Request Training Consultation</a>
  </div>
</div>
{{ end }}
